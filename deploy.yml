name: Validate & Deploy to GitHub Pages

# Runs on every push/PR (so a bad commit fails loudly), but only
# deploys when main itself moves. Manual runs are always available
# from the Actions tab via "Run workflow".
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# If two deploys are queued, only the newest one matters — cancel the rest.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint index.html
        run: npx --yes html-validate@8 index.html

      - name: Check for broken local links/assets
        run: |
          for f in og-image.png apple-touch-icon.png; do
            test -f "$f" || { echo "::error::Missing referenced asset: $f"; exit 1; }
          done

  deploy:
    name: Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
